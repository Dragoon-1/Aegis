version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: aegis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       aegisdb
      POSTGRES_USER:     aegis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegispass}
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U aegis -d aegisdb"]
      interval: 10s
      timeout:  5s
      retries:  5

  api:
    build:
      context:    .
      dockerfile: Dockerfile
    container_name: aegis_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://aegis:${POSTGRES_PASSWORD:-aegispass}@db/aegisdb
      GEMINI_API_KEY:    ${GEMINI_API_KEY}
      POLYGON_PRIVATE_KEY: ${POLYGON_PRIVATE_KEY}
      CONTRACT_ADDRESS:  ${CONTRACT_ADDRESS}
      POLYGON_RPC_URL:   ${POLYGON_RPC_URL:-https://rpc-amoy.polygon.technology/}
      REPORTS_DIR:       /app/reports
      ENVIRONMENT:       ${ENVIRONMENT:-development}
    volumes:
      - ./reports:/app/reports
      - .:/app
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "info"]

volumes:
  aegis_pgdata:
    driver: local
